name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: inspectra_user
          POSTGRES_PASSWORD: inspectra_password
          POSTGRES_DB: inspectra_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Check Formatting & Linting (Biome)
      run: npx biome check ./src

    - name: Generate Prisma Client
      run: npx prisma generate

    - name: Database setup and seed
      run: |
        npx prisma db push --accept-data-loss
        npx prisma db seed
      env:
        DATABASE_URL: postgresql://inspectra_user:inspectra_password@localhost:5432/inspectra_db?schema=public

    - name: Type Check (TypeScript)
      run: npx tsc --noEmit

    - name: Run Tests
      run: npm run test --if-present
      env:
        DATABASE_URL: postgresql://inspectra_user:inspectra_password@localhost:5432/inspectra_db?schema=public
        PORT: 3000
