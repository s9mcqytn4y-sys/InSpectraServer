version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: inspectra_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inspectra
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inspectra"]
      interval: 5s
      timeout: 5s
      retries: 5

  inspectra_server:
    build: .
    container_name: inspectra_backend
    ports:
      - "8001:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/inspectra?schema=public
      - PORT=3000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
