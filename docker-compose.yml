services:
  inspectra-db:
    image: postgres:16-alpine
    container_name: inspectra_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: inspectra_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  inspectra-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inspectra_backend
    restart: always
    ports:
      - "8000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgrespassword@inspectra-db:5432/inspectra_db?schema=public
      JWT_SECRET: inspectra-docker-secret-change-in-production
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && node dist/index.js"
    depends_on:
      inspectra-db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads

  inspectra-frontend:
    build:
      context: ../inspectra-frontend
      dockerfile: Dockerfile
    container_name: inspectra_frontend
    restart: always
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    depends_on:
      - inspectra-backend

volumes:
  pgdata:
